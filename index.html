<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTF New Tab</title>
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://code.iconify.design" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  
  <!-- DNS prefetch for API domains -->
  <link rel="dns-prefetch" href="https://api.open-meteo.com">
  <link rel="dns-prefetch" href="https://geocoding-api.open-meteo.com">
  <link rel="dns-prefetch" href="https://min-api.cryptocompare.com">
  <link rel="dns-prefetch" href="https://static.cryptohopper.com">
  
  <!-- Preload critical font -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" as="style">
  
  <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>

  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/weather.css">
  <link rel="stylesheet" href="CSS/crypto.css">
  <link rel="icon" type="image/svg+xml" href="Resources/Icons/Favicon.svg" sizes="any">
  
</head>

<body>
  <script>
    // Prevent FOUC: apply saved settings before page renders
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('ltf_settings'));
        if (s) {
          if (s.elementColor) document.documentElement.style.setProperty('--element-color', s.elementColor);
          var bgUrl = s.bgUrl || '../Resources/Backgrounds/GoldenGate_Light.jpg';
          document.documentElement.style.setProperty('--bg-url', 'url(' + bgUrl + ')');
          // Preload background image for faster rendering
          new Image().src = bgUrl;
        }
      } catch(e) {}
      if (localStorage.getItem('isDarkModeEnabled') === 'true') {
        document.body.classList.add('dark-mode');
      }
      
      // Populate weather widget from cache immediately
      try {
        var weatherCache = JSON.parse(localStorage.getItem('ltf_weather_cache'));
        if (weatherCache && weatherCache.timestamp && (Date.now() - weatherCache.timestamp < 600000)) {
          var data = weatherCache.data;
          if (data && data.current) {
            var current = data.current;
            var daily = data.daily;
            
            // Calculate sunrise/sunset for icon selection
            var sunrise = new Date(daily.sunrise[0]).getTime() / 1000;
            var sunset = new Date(daily.sunset[0]).getTime() / 1000;
            var currentTime = new Date().getTime() / 1000;
            var isDaytime = currentTime >= sunrise && currentTime <= sunset;
            
            // Determine weather icon
            var weatherCode = current.weather_code;
            var baseUrl = 'https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/';
            var iconPath = baseUrl + 'not-available.svg';
            
            if (weatherCode === 0) {
              iconPath = isDaytime ? baseUrl + 'clear-day.svg' : baseUrl + 'clear-night.svg';
            } else if (weatherCode === 1 || weatherCode === 2) {
              iconPath = isDaytime ? baseUrl + 'partly-cloudy-day.svg' : baseUrl + 'partly-cloudy-night.svg';
            } else if (weatherCode === 3) {
              iconPath = isDaytime ? baseUrl + 'overcast-day.svg' : baseUrl + 'overcast-night.svg';
            } else if (weatherCode === 45 || weatherCode === 48) {
              iconPath = baseUrl + 'fog.svg';
            } else if (weatherCode >= 51 && weatherCode <= 57) {
              iconPath = isDaytime ? baseUrl + 'partly-cloudy-day-drizzle.svg' : baseUrl + 'partly-cloudy-night-drizzle.svg';
            } else if ((weatherCode >= 61 && weatherCode <= 67) || (weatherCode >= 80 && weatherCode <= 82)) {
              iconPath = baseUrl + 'rain.svg';
            } else if ((weatherCode >= 71 && weatherCode <= 77) || weatherCode === 85 || weatherCode === 86) {
              iconPath = baseUrl + 'snow.svg';
            } else if (weatherCode >= 95 && weatherCode <= 99) {
              iconPath = baseUrl + 'thunderstorms.svg';
            }
            
            // Populate weather elements
            var weatherIcon = document.querySelector('.weather-icon');
            var temperature = document.querySelector('.temperature');
            var feelsLike = document.querySelector('.feels-like');
            var pressure = document.querySelector('.pressure');
            var uvIndex = document.querySelector('.uv-index');
            var wind = document.querySelector('.wind');
            var humidity = document.querySelector('.humidity');
            
            if (weatherIcon) weatherIcon.src = iconPath;
            if (temperature) temperature.innerHTML = Math.round(current.temperature_2m) + '°C';
            if (feelsLike) feelsLike.innerHTML = Math.round(current.apparent_temperature) + '°C';
            if (pressure) pressure.innerHTML = Math.round(current.surface_pressure) + ' hPa';
            if (uvIndex) uvIndex.innerHTML = Math.round(current.uv_index);
            if (wind) wind.innerHTML = current.wind_speed_10m + ' km/h';
            if (humidity) humidity.innerHTML = current.relative_humidity_2m + '%';
          }
        }
      } catch(e) {}
    })();
  </script>

  <!-- MENU BEGIN -->
  <div class="menu">
    <span><a href="https://latinof.github.io/LTFNewTab/">NewTab</a></span>
    <span><a href="https://winget.run/">Apps</a></span>
    <span><a href="https://latinof.github.io/LTFNewTab/oled">OLED Care</a></span>
  </div>
  <!-- Menu ENDS -->

  <!-- Weather Widget BEGIN -->
  <div class="weather-widget">
    <img class="weather-icon" src="">
    <span class="temperature dark"></span>
  </div>
  
  <div class="weather-info">
    <ul>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/thermometer-celsius.svg">
        <span class="feels-like"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/uv-index.svg">
        <span class="uv-index"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/humidity.svg">
        <span class="humidity"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/wind.svg">
        <span class="wind"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/barometer.svg">
        <span class="pressure"></span>
      </li>
    </ul>
  </div>
  
  <!-- Weather Widget ENDS -->

  <!-- Dark Mode Toggle BEGIN -->
  <div class="toggle-container">

  </div>

  <div class="wrapper">

    <!-- Custom Context Menu BEGIN -->

          <button class="contextmenu-button" onclick="swapDuckDuckGo()" id="aDuckDuckGo">
            <img src="Resources/Icons/DuckDuckGo.svg" style="width:24px; margin-right:6px;">
            <span>DuckDuckGo</span>

        </li>
        <li class="contextmenu-item">
          <button class="contextmenu-button" onclick="swapGoogle()" id="aGoogle">
            <img src="Resources/Icons/Google.svg" style="width:24px; margin-right:6px;">
            <span>Google</span>
          </button>
        </li>
        <li class="contextmenu-item">
          <button class="contextmenu-button" onclick="swapTV()" id="aTV">
            <img src="Resources/Icons/Fanart.png" style="width:24px; margin-right:6px;">
            <span>Fanart</span>
          </button>
        </li>
      </ul>
    </div>
    <!-- Custom Context Menu ENDS -->


    <!-- Searchbar BEGIN -->
    <div class="searchbar dark" id="EngineSwapper">
      <form role="search" id="form">
        <input type="search" id="query" name="Q" placeholder="Mah Davveroh?" autocomplete="off">
        <input type="image" class="searchbutton" src="Resources/Icons/Search.svg" alt="submit">
      </form>
    </div>
    <!-- Searchbar ENDS -->


    <!-- Drawers BEGIN -->
    <div class="drawercontainer" id="drawercontainer"></div>
    <!-- Drawers END -->

<!-- Crypto Widget BEGIN -->
<div class="cryptoWidget dark">

  <section class="widget">

        data-realtime="on">
      </div>
    </div>
  </section>


</div>
<!-- Crypto Widget END -->

  </div>

    <button id="fabMain"><iconify-icon icon="fluent:edit-24-filled"></iconify-icon></button>
  </div>
