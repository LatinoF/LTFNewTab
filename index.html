<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTF New Tab</title>
  <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>

  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/weather.css">
  <link rel="stylesheet" href="CSS/crypto.css">
  <link rel="icon" type="image/svg+xml" href="Resources/Icons/Favicon.svg" sizes="any">
  
</head>

<body>

  <!-- MENU BEGIN -->
  <div class="menu dark">
    <span><a href="https://latinof.github.io/LTFNewTab/" style="text-shadow: -.25px -.25px 0 black, .25px .25px black;">NewTab</a></span>
    <span><a href="https://winget.run/">Apps</a></span>
    <span><a href="https://latinof.github.io/LTFNewTab/oled">OLED Care</a></span>
  </div>
  <!-- Menu ENDS -->

  <!-- Weather Widget BEGIN -->
  <div class="weather-widget">
    <img class="weather-icon" src="">
    <span class="temperature dark"></span>
  </div>
  
  <div class="weather-info">
    <ul>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/thermometer-celsius.svg">
        <span class="feels-like"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/uv-index.svg">
        <span class="uv-index"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/humidity.svg">
        <span class="humidity"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/wind.svg">
        <span class="wind"></span>
      </li>
      <li>
        <img src="https://cdn.jsdelivr.net/npm/@meteocons/svg@3.0.0-next.10/fill/barometer.svg">
        <span class="pressure"></span>
      </li>
    </ul>
  </div>
  
  <!-- Weather Widget ENDS -->

  <!-- Dark Mode Toggle BEGIN -->
  <div class="toggle-container">
    <img src="Resources/Icons/Sun.svg" alt="Toggle Dark Mode" id="toggle">
  </div>
  <!-- Dark Mode Toggle ENDS -->


  <div class="wrapper">

    <!-- Custom Context Menu BEGIN -->
    <div class="contextmenu" id="menu">
      <ul class="contextmenu-list">
        <li class="contextmenu-item">
          <button class="contextmenu-button" onclick="swapDuckDuckGo()" id="aDuckDuckGo">
            <img src="Resources/Icons/DuckDuckGo.svg" style="width:24px; margin-right:6px;">
            <span>DuckDuckGo</span>
          </button>
        </li>
        <li class="contextmenu-item">
          <button class="contextmenu-button" onclick="swapGoogle()" id="aGoogle">
            <img src="Resources/Icons/Google.svg" style="width:24px; margin-right:6px;">
            <span>Google</span>
          </button>
        </li>
        <li class="contextmenu-item">
          <button class="contextmenu-button" onclick="swapTV()" id="aTV">
            <img src="Resources/Icons/Fanart.png" style="width:24px; margin-right:6px;">
            <span>Fanart</span>
          </button>
        </li>
      </ul>
    </div>
    <!-- Custom Context Menu ENDS -->


    <!-- Searchbar BEGIN -->
    <div class="searchbar dark" id="EngineSwapper">
      <form role="search" id="form">
        <input type="search" id="query" name="Q" placeholder="Mah Davveroh?" autocomplete="off">
        <input type="image" class="searchbutton" src="Resources/Icons/Search.svg" alt="submit">
      </form>
    </div>
    <!-- Searchbar ENDS -->


    <!-- Drawers BEGIN -->
    <div class="drawercontainer" id="drawercontainer"></div>
    <!-- Drawers END -->

<!-- Crypto Widget BEGIN -->
<div class="cryptoWidget dark">

  <section class="widget">
    <div class="widgetContainer">
      <div class="cryptohopper-web-widget" data-id="8" data-chart_color="#00bde2" data-coins="bitcoin"
        data-realtime="on">
      </div>
    </div>
  </section>


</div>
<!-- Crypto Widget END -->

  </div>

  <script defer src="./JS/defaults.js"></script>
  <script defer src="./JS/script.js"></script>
  <script defer src="./JS/toggle.js"></script>
  <script defer src="./JS/drawer.js"></script>
  <script defer src="./JS/weather.js"></script>
  <script async src="./JS/crypto_hopper_widget_ltfmod.js"></script>
  <!-- <script async src="https://www.cryptohopper.com/widgets/js/script"></script> -->
  <div id="fabContainer">
    <div class="fab-sub-buttons">
      <button class="fab-sub fab-sub-settings" id="fabSettings" title="Settings"><iconify-icon icon="fluent:settings-24-filled"></iconify-icon></button>
      <button class="fab-sub fab-sub-import" id="fabImport" title="Import"><iconify-icon icon="fluent:arrow-upload-24-filled"></iconify-icon></button>
      <button class="fab-sub fab-sub-export" id="fabExport" title="Export"><iconify-icon icon="fluent:arrow-download-24-filled"></iconify-icon></button>
      <button class="fab-sub fab-sub-reset" id="fabReset" title="Reset to defaults"><iconify-icon icon="fluent:arrow-sync-24-filled"></iconify-icon></button>
    </div>
    <button id="fabMain"><iconify-icon icon="fluent:edit-24-filled"></iconify-icon></button>
  </div>
  <input type="file" id="fabFileInput" accept=".json" style="display:none">
  
</body>

</html>
